name: Self-use Bridge

on:
  push:
    branches:
      - codex/self-use-release
    paths:
      - ".github/workflows/self-use-bridge.yml"
      - "package.json"
      - "package-lock.json"
      - "packages/bridge/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bridge:
    name: Bridge tarball
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check Bridge
        run: npx tsc --noEmit -p packages/bridge/tsconfig.json

      - name: Test Bridge
        run: npm run test:bridge

      - name: Build Bridge
        run: npm run bridge:build

      - name: Pack bridge
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bridge-dist"
          npm pack --workspace=packages/bridge --pack-destination "$RUNNER_TEMP/bridge-dist"
          TARBALL="$(find "$RUNNER_TEMP/bridge-dist" -maxdepth 1 -type f -name '*.tgz' | head -n 1)"
          if [[ -z "$TARBALL" ]]; then
            echo "::error::Bridge tarball was not created"
            exit 1
          fi
          mv "$TARBALL" "$RUNNER_TEMP/bridge-dist/ccpocket-bridge-self-use.tgz"

      - uses: actions/upload-artifact@v4
        with:
          name: ccpocket-bridge-self-use
          path: ${{ runner.temp }}/bridge-dist/ccpocket-bridge-self-use.tgz

      - name: Resolve release tag
        id: tag
        shell: bash
        run: echo "tag=self-use-bridge-latest" >> "$GITHUB_OUTPUT"

      - name: Point release tag at this build
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git tag -f "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG" --force

      - name: Create release notes
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/bridge-release-notes.md" <<EOF
          Self-use bridge build from augumn/ccpocket.

          This build only contains the Bridge package and is intended for testing Codex rate-limit auto-continuation before an upstream release.

          Example:

          \`\`\`powershell
          npx -y https://github.com/augumn/ccpocket/releases/download/${{ steps.tag.outputs.tag }}/ccpocket-bridge-self-use.tgz ccpocket-bridge
          \`\`\`
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "CC Pocket bridge self-use $TAG" \
              --notes-file "$RUNNER_TEMP/bridge-release-notes.md" \
              --prerelease
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "CC Pocket bridge self-use $TAG" \
              --notes-file "$RUNNER_TEMP/bridge-release-notes.md" \
              --prerelease
          fi
          gh release upload "$TAG" "$RUNNER_TEMP/bridge-dist/ccpocket-bridge-self-use.tgz" --clobber
